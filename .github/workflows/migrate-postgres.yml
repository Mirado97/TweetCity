name: Migrate Railway Postgres to AWS RDS

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Check required secrets
        env:
          RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
          AWS_DATABASE_URL: ${{ secrets.AWS_DATABASE_URL }}
        run: |
          test -n "$RAILWAY_DATABASE_URL" || (echo "Missing RAILWAY_DATABASE_URL" && exit 1)
          test -n "$AWS_DATABASE_URL" || (echo "Missing AWS_DATABASE_URL" && exit 1)

      - name: Dump Railway database
        env:
          RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: |
          pg_dump "$RAILWAY_DATABASE_URL" \
            --format=custom \
            --verbose \
            --no-owner \
            --no-acl \
            --file=railway.dump

      - name: Restore to AWS RDS
        env:
          AWS_DATABASE_URL: ${{ secrets.AWS_DATABASE_URL }}
        run: |
          pg_restore \
            --dbname="$AWS_DATABASE_URL" \
            --verbose \
            --clean \
            --if-exists \
            --no-owner \
            --no-acl \
            railway.dump
