name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tweetcity-aws-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          test -n "$EC2_HOST" || (echo "Missing EC2_HOST" && exit 1)
          test -n "$EC2_USER" || (echo "Missing EC2_USER" && exit 1)
          test -n "$EC2_SSH_KEY" || (echo "Missing EC2_SSH_KEY" && exit 1)

          install -m 700 -d ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/ec2_deploy_key "$EC2_USER@$EC2_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail

          export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"

          cd /home/ubuntu/TweetCity
          git fetch origin main
          git reset --hard origin/main

          cd /home/ubuntu/TweetCity/backend
          npm ci
          pm2 restart tweetcity-backend --update-env

          cd /home/ubuntu/TweetCity/frontend
          npm ci
          VITE_API_URL=https://tweetcity.fun npm run build

          sudo rm -rf /var/www/tweetcity/*
          sudo cp -r dist/. /var/www/tweetcity/
          sudo chown -R www-data:www-data /var/www/tweetcity

          sudo nginx -t
          sudo systemctl reload nginx

          curl -fsS http://127.0.0.1:3001/health
          curl -fsS http://127.0.0.1/health
          REMOTE
